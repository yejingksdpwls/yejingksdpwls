name: Profile Card SVG

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # 매일 새벽 3시 KST / UTC 기준

jobs:
  build-profile-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate profile card SVG
        run: python scripts/generate_profile_card.py
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_USERNAME: yejingksdpwls
          TERMINAL_NAME: hanyejin

      - name: Commit generated SVG
        run: |
          if [ -n "$(git status --porcelain assets/profile-card.svg)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/profile-card.svg
            git commit -m "chore: update profile card svg"
            git push
          else
            echo "No changes to commit"
          fi
